<style>
/* ============================================================
   Section 1: Font imports and CSS variables
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Space+Grotesk:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;600&amp;display=swap');

:root {
  --color-primary: #0066CC;
  --color-primary-dark: #004C99;
  --color-text-primary: #1A1D23;
  --color-text-secondary: #4A5568;
  --color-bg-secondary: #F5F6F7;
  --color-bg-accent: #F0F4F8;
  --color-border: #E2E8F0;
  --color-border-light: #EDF2F7;
  --color-code-bg: #1A1D23;
  --color-code-text: #E4E8EE;
  --color-inline-code-bg: #F0F4F8;
  --color-inline-code-text: #0066CC;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
  --font-heading: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-code: 'JetBrains Mono', 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
}

/* ============================================================
   Section 2: Typography
   ============================================================ */
body {
  font-family: var(--font-body) !important;
  color: var(--color-text-secondary);
  line-height: 1.75;
  -moz-osx-font-smoothing: grayscale;
  -webkit-font-smoothing: antialiased;
}

h1, h2, h3, #toctitle, .sidebarblock > .content > .title, h4, h5, h6 {
  font-family: var(--font-heading) !important;
  color: var(--color-text-primary) !important;
  letter-spacing: -0.02em;
  font-style: normal;
}

h1, h2 {
  font-weight: 700;
}

h3, #toctitle, .sidebarblock > .content > .title, h4, h5, h6 {
  font-weight: 600;
}

#content h1 > a.link, h2 > a.link, h3 > a.link, #toctitle > a.link,
.sidebarblock > .content > .title > a.link, h4 > a.link, h5 > a.link, h6 > a.link {
  color: var(--color-text-primary);
}
#content h1 > a.link:hover, h2 > a.link:hover, h3 > a.link:hover, #toctitle > a.link:hover,
.sidebarblock > .content > .title > a.link:hover, h4 > a.link:hover, h5 > a.link:hover, h6 > a.link:hover {
  color: var(--color-primary);
}

.admonitionblock td.content > .title, .audioblock > .title, .exampleblock > .title,
.imageblock > .title, .listingblock > .title, .literalblock > .title,
.stemblock > .title, .openblock > .title, .paragraph > .title,
.quoteblock > .title, table.tableblock > .title, .verseblock > .title,
.videoblock > .title, .dlist > .title, .olist > .title, .ulist > .title,
.qlist > .title, .hdlist > .title {
  font-family: var(--font-body);
  color: var(--color-text-primary);
}

p {
  color: var(--color-text-secondary);
}

/* ============================================================
   Section 3: Links and colors
   ============================================================ */
a {
  color: var(--color-primary);
  text-decoration: none;
}
a:hover, a:focus {
  color: var(--color-primary-dark);
  text-decoration: underline;
}

hr {
  border-color: var(--color-border);
}

blockquote {
  border-left-color: var(--color-border);
}

/* ============================================================
   Section 4: Code blocks (dark theme)
   ============================================================ */
pre, pre > code {
  font-family: var(--font-code) !important;
}

.literalblock pre, .listingblock > .content > pre {
  background: var(--color-code-bg) !important;
  color: var(--color-code-text);
  border: none;
  border-radius: 8px;
  padding: 20px;
  font-size: 0.875rem;
}

.literalblock pre,
.listingblock > .content > pre:not(.highlight),
.listingblock > .content > pre[class=highlight],
.listingblock > .content > pre[class^="highlight "] {
  background: var(--color-code-bg) !important;
}

.listingblock code[data-lang]::before {
  color: var(--color-code-text);
}

:not(pre):not([class^=L]) > code {
  background: var(--color-inline-code-bg) !important;
  color: var(--color-inline-code-text);
  font-family: var(--font-code);
  padding: 0.15em 0.4em;
  border-radius: 4px;
  font-size: 0.875em;
}

pre {
  color: var(--color-code-text);
  font-family: var(--font-code);
}
pre code, pre pre {
  color: inherit;
}

/* ============================================================
   Section 4b: Rouge syntax highlighting (dark theme)
   ============================================================ */
pre.rouge {
  background-color: var(--color-code-bg) !important;
  color: var(--color-code-text);
}

pre.rouge .cm, pre.rouge .c1, pre.rouge .c, pre.rouge .ch, pre.rouge .cd, pre.rouge .cpf {
  color: #6B7280;
  font-style: italic;
}
pre.rouge .cp, pre.rouge .cs {
  color: #6B7280;
  font-weight: bold;
  font-style: italic;
}

pre.rouge .k, pre.rouge .kv, pre.rouge .kc, pre.rouge .kd, pre.rouge .kn,
pre.rouge .kp, pre.rouge .kr, pre.rouge .ow {
  color: #7DD3FC;
  font-weight: bold;
}
pre.rouge .kt {
  color: #93C5FD;
  font-weight: bold;
}

pre.rouge .s, pre.rouge .dl, pre.rouge .sb, pre.rouge .sc, pre.rouge .sd,
pre.rouge .s2, pre.rouge .se, pre.rouge .sh, pre.rouge .si, pre.rouge .sx, pre.rouge .s1 {
  color: #6EE7B7;
}
pre.rouge .sa {
  color: #6EE7B7;
  font-weight: bold;
}
pre.rouge .sr {
  color: #6EE7B7;
}
pre.rouge .ss {
  color: #C4B5FD;
}

pre.rouge .m, pre.rouge .mb, pre.rouge .mx, pre.rouge .mf, pre.rouge .mh,
pre.rouge .mi, pre.rouge .mo, pre.rouge .il {
  color: #5EEAD4;
}

pre.rouge .na {
  color: #5EEAD4;
}
pre.rouge .nb, pre.rouge .bp {
  color: #93C5FD;
}
pre.rouge .nc {
  color: #93C5FD;
  font-weight: bold;
}
pre.rouge .no, pre.rouge .vc, pre.rouge .vg, pre.rouge .vi, pre.rouge .nv, pre.rouge .vm {
  color: #5EEAD4;
}
pre.rouge .and {
  color: #C4B5FD;
  font-weight: bold;
}
pre.rouge .ni {
  color: #C4B5FD;
}
pre.rouge .ne, pre.rouge .nf, pre.rouge .fm, pre.rouge .nl {
  color: #FCA5A5;
  font-weight: bold;
}
pre.rouge .nn {
  color: #D1D5DB;
}
pre.rouge .nt {
  color: #7DD3FC;
}

pre.rouge .o {
  color: #D1D5DB;
  font-weight: bold;
}

pre.rouge .err {
  color: #FCA5A5;
  background-color: rgba(252, 165, 165, 0.1);
}

pre.rouge .gd {
  color: #FCA5A5;
  background-color: rgba(252, 165, 165, 0.1);
}
pre.rouge .gi {
  color: #6EE7B7;
  background-color: rgba(110, 231, 183, 0.1);
}
pre.rouge .ge { font-style: italic; color: var(--color-code-text); }
pre.rouge .gs { font-weight: bold; }
pre.rouge .gh, pre.rouge .gu { color: #6B7280; }
pre.rouge .go, pre.rouge .gp { color: #9CA3AF; }
pre.rouge .gt, pre.rouge .gr { color: #FCA5A5; }
pre.rouge .w { color: #4B5563; }

/* ============================================================
   Section 5: TOC sidebar
   ============================================================ */
#toc.toc2 {
  background: var(--color-bg-secondary);
  border-right: 1px solid var(--color-border);
}

#toc.toc2 #toctitle {
  font-family: var(--font-heading);
  color: var(--color-text-primary);
  font-weight: 700;
}

#toc.toc2 ul {
  font-family: var(--font-body);
}

#toc.toc2 a {
  color: var(--color-text-secondary);
  text-decoration: none;
  transition: color 0.15s ease;
}

#toc.toc2 a:hover {
  color: var(--color-primary);
  text-decoration: none;
}

#toc li {
  line-height: 1.4;
  margin-top: 0.35em;
}

#header > h1:first-child + #toc {
  border-top-color: var(--color-border);
}

#toc {
  border-bottom-color: var(--color-border);
}

/* ============================================================
   Section 6: Tables
   ============================================================ */
table.tableblock,
table.tableblock thead,
table.tableblock tfoot {
  background: #fff;
}

table.tableblock {
  border: 1px solid var(--color-border);
  border-radius: 8px;
  border-collapse: separate;
  border-spacing: 0;
  overflow: hidden;
}

table.tableblock thead tr th,
table.tableblock thead tr td {
  background: var(--color-bg-secondary);
  color: var(--color-text-primary);
  font-weight: 600;
  font-family: var(--font-body);
  padding: 12px 16px;
  border-bottom: 1px solid var(--color-border);
}

table.tableblock tbody tr td,
table.tableblock tbody tr th {
  padding: 12px 16px;
  border-bottom: 1px solid var(--color-border);
  color: var(--color-text-secondary);
}

table.tableblock tbody tr:last-child td,
table.tableblock tbody tr:last-child th {
  border-bottom: none;
}

table.tableblock tr.even,
table.tableblock tr.alt {
  background: transparent;
}

table.tableblock tfoot tr th,
table.tableblock tfoot tr td {
  background: var(--color-bg-secondary);
  padding: 12px 16px;
}

/* ============================================================
   Section 7: Admonition blocks
   ============================================================ */
.admonitionblock > table {
  border-radius: 8px;
  overflow: hidden;
}

.admonitionblock > table td.content {
  border-left: 4px solid var(--color-border);
  padding: 16px 20px;
  color: var(--color-text-secondary);
  background: transparent;
}

.admonitionblock.note > table td.content {
  border-left-color: var(--color-primary);
  background: rgba(0, 102, 204, 0.05);
}
.admonitionblock td.icon .icon-note::before {
  color: var(--color-primary) !important;
}

.admonitionblock.tip > table td.content {
  border-left-color: #10B981;
  background: rgba(16, 185, 129, 0.05);
}
.admonitionblock td.icon .icon-tip::before {
  color: #10B981 !important;
  text-shadow: none !important;
}

.admonitionblock.warning > table td.content {
  border-left-color: #F59E0B;
  background: rgba(245, 158, 11, 0.05);
}
.admonitionblock td.icon .icon-warning::before {
  color: #F59E0B !important;
}

.admonitionblock.caution > table td.content {
  border-left-color: #EF4444;
  background: rgba(239, 68, 68, 0.05);
}
.admonitionblock td.icon .icon-caution::before {
  color: #EF4444 !important;
}

.admonitionblock.important > table td.content {
  border-left-color: #EF4444;
  background: rgba(239, 68, 68, 0.05);
}
.admonitionblock td.icon .icon-important::before {
  color: #EF4444 !important;
}

.admonitionblock > table td.icon .title {
  font-family: var(--font-body);
}

/* ============================================================
   Section 8: Landing page styles
   ============================================================ */
.landing-hero {
  text-align: center;
  padding: 20px 20px 10px;
  max-width: 900px;
  margin: 0 auto;
}
.landing-hero h2 {
  font-size: 1.8em;
  font-weight: 700;
  color: var(--color-text-primary);
  margin: 12px 0 8px;
}
.landing-hero p {
  font-size: 1.05em;
  color: var(--color-text-secondary);
  max-width: 620px;
  margin: 0 auto 24px;
  line-height: 1.5;
}
.landing-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  max-width: 880px;
  margin: 0 auto 28px;
}
.landing-card {
  display: block;
  background: #fff;
  border: 1px solid var(--color-border);
  border-radius: 10px;
  padding: 28px 20px;
  text-align: center;
  text-decoration: none;
  color: inherit;
  cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.landing-card:hover {
  border-color: var(--color-primary);
  box-shadow: 0 2px 12px rgba(0, 102, 204, 0.10);
}
.landing-card-icon {
  font-size: 2em;
  color: var(--color-primary);
  margin-bottom: 12px;
}
.landing-card h3 {
  font-size: 1.05em;
  font-weight: 700;
  color: var(--color-text-primary);
  margin: 0 0 6px;
}
.landing-card p {
  font-size: 0.9em;
  color: var(--color-text-secondary);
  line-height: 1.45;
  margin: 0;
}
.landing-links {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  max-width: 880px;
  margin: 0 auto 32px;
}
.landing-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 20px;
  border: 1px solid var(--color-border);
  border-radius: 8px;
  font-size: 0.95em;
  color: var(--color-text-secondary) !important;
  text-decoration: none !important;
  transition: border-color 0.2s, color 0.2s, background-color 0.2s;
}
.landing-link:hover {
  border-color: var(--color-primary);
  color: var(--color-primary) !important;
  background-color: var(--color-bg-accent);
}
.landing-link svg {
  width: 16px;
  height: 16px;
  fill: currentColor;
}
@media (max-width: 700px) {
  .landing-cards { grid-template-columns: 1fr; }
}
@media (min-width: 701px) and (max-width: 950px) {
  .landing-cards { grid-template-columns: repeat(2, 1fr); }
}

/* ============================================================
   Section 8c: Function category badges
   ============================================================ */
.fn-badge {
  display: inline-block;
  vertical-align: middle;
  margin-left: 0.6em;
  padding: 0.1em 0.55em;
  border-radius: 999px;
  font-family: var(--font-body);
  font-size: 0.62em;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  line-height: 1.5;
  border: 1px solid transparent;
  position: relative;
  top: -0.15em;
}
.fn-badge-graph       { background: rgba(0, 102, 204, 0.10);   color: #0066CC; border-color: rgba(0, 102, 204, 0.25); }
.fn-badge-math        { background: rgba(124, 58, 237, 0.10);  color: #7C3AED; border-color: rgba(124, 58, 237, 0.25); }
.fn-badge-collections { background: rgba(16, 185, 129, 0.12);  color: #047857; border-color: rgba(16, 185, 129, 0.30); }
.fn-badge-geo         { background: rgba(13, 148, 136, 0.12);  color: #0F766E; border-color: rgba(13, 148, 136, 0.30); }
.fn-badge-vector      { background: rgba(217, 70, 239, 0.10);  color: #A21CAF; border-color: rgba(217, 70, 239, 0.25); }
.fn-badge-text        { background: rgba(245, 158, 11, 0.12);  color: #B45309; border-color: rgba(245, 158, 11, 0.30); }
.fn-badge-date        { background: rgba(59, 130, 246, 0.10);  color: #1D4ED8; border-color: rgba(59, 130, 246, 0.25); }
.fn-badge-search      { background: rgba(236, 72, 153, 0.10);  color: #BE185D; border-color: rgba(236, 72, 153, 0.25); }
.fn-badge-misc        { background: rgba(107, 114, 128, 0.12); color: #4B5563; border-color: rgba(107, 114, 128, 0.30); }

/* ============================================================
   Section 8d: Bucket Selection Strategy animation (.bss-*)
   ============================================================ */
.bss-svg {
  width: 100%;
  height: auto;
  max-width: 1200px;
  display: block;
  margin: 1.25rem auto;
  font-family: var(--font-body);
}
.bss-svg text { fill: var(--color-text-primary); }
.bss-section-label {
  font-size: 19px;
  font-weight: 700;
  letter-spacing: 0.06em;
  fill: var(--color-text-secondary);
}
.bss-section-sub { font-size: 14px; fill: var(--color-text-secondary); font-style: italic; }
.bss-divider { stroke: var(--color-border-light); stroke-width: 1; stroke-dasharray: 4 6; }

/* Producer / source boxes */
.bss-producer rect { fill: #fff; stroke: var(--color-border); stroke-width: 1.5; }
.bss-producer-title { font-size: 14px; font-weight: 600; fill: var(--color-text-secondary); letter-spacing: 0.04em; }

.bss-record rect { fill: #fff; stroke-width: 1.5; }
.bss-record text { font-size: 13px; font-weight: 600; fill: var(--color-text-primary); }

/* Bucket boxes — colour-coded per index */
.bss-bucket rect { fill: #fff; stroke-width: 1.5; }
.bss-bucket-title { font-size: 13px; font-weight: 700; }
.bss-bucket-sub   { font-size: 11px; fill: var(--color-text-secondary); }
.bss-bucket-0 rect { stroke: #93C5FD; } .bss-bucket-0 .bss-bucket-title { fill: #0066CC; }
.bss-bucket-1 rect { stroke: #C4B5FD; } .bss-bucket-1 .bss-bucket-title { fill: #7C3AED; }
.bss-bucket-2 rect { stroke: #6EE7B7; } .bss-bucket-2 .bss-bucket-title { fill: #047857; }

/* Connectors and dots */
.bss-conn { stroke: var(--color-text-secondary); stroke-width: 1.5; fill: none; opacity: 0.35; stroke-dasharray: 4 4; stroke-linecap: round; }
.bss-conn-0 { stroke: #93C5FD; opacity: 0.55; }
.bss-conn-1 { stroke: #C4B5FD; opacity: 0.55; }
.bss-conn-2 { stroke: #6EE7B7; opacity: 0.55; }

.bss-dot { stroke: #fff; stroke-width: 1; }
.bss-dot-0 { fill: #0066CC; }
.bss-dot-1 { fill: #7C3AED; }
.bss-dot-2 { fill: #10B981; }

/* Hash box for the partitioned panel */
.bss-hash rect { fill: #FAFBFC; stroke: var(--color-primary); stroke-width: 1.5; stroke-dasharray: 5 4; }
.bss-hash-title { font-size: 13px; font-weight: 700; fill: var(--color-primary); font-family: var(--font-code); }

/* Thread labels */
.bss-thread-label { font-size: 12px; font-weight: 700; fill: var(--color-text-secondary); letter-spacing: 0.05em; }

@media (max-width: 700px) {
  .bss-svg { display: none; }
}

/* ============================================================
   Section 8b: Cookie banner styles
   ============================================================ */
#arcadedb-cookie-banner {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  z-index: 9999;
  background: #1A1D23;
  color: #CCCCCC;
  border-radius: 8px;
  padding: 1.2rem 1.4rem;
  max-width: 340px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  font-size: 0.875rem;
  line-height: 1.5;
  display: flex;

  gap: 0.9rem;
}
#arcadedb-cookie-banner a {
  color: #5BC0EB;

}
#arcadedb-cookie-banner button {
  align-self: flex-end;

}

/* ============================================================
   Section 9: Sidebar, example, and quote blocks
   ============================================================ */
.sidebarblock {
  background: var(--color-bg-secondary) !important;
  border-color: var(--color-border) !important;
  border-radius: 8px;
}

.sidebarblock > .content > .title {
  color: var(--color-text-primary);
}

.exampleblock > .content {
  border-color: var(--color-border);
  background: #fff;
  border-radius: 8px;
}

.quoteblock {
  border-left-color: var(--color-primary);
}
.quoteblock blockquote::before {

</style>
