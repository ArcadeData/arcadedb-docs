site:
  title: ArcadeDB Documentation
  url: https://docs.arcadedb.com
  start_page: arcadedb::index.adoc

# Algolia DocSearch credentials are injected from process.env at build
# time by scripts/inject-algolia-keys.js. The keys land at
# site.keys.algoliaAppId / algoliaApiKey / algoliaIndexName, which the
# head, header, and footer partials check before rendering search UI.
antora:
  extensions:
    - require: ./scripts/inject-algolia-keys.js

content:
  sources:
    - url: .
      branches: HEAD
      start_path: docs

ui:
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true
  supplemental_files: ./docs/ui/supplemental

asciidoc:
  extensions:
    - asciidoctor-kroki
  attributes:
    kroki-fetch-diagram: '@'
    kroki-server-url: 'https://kroki.io'
    page-pagination: ''
    experimental: ''
    idprefix: ''
    idseparator: '-'

runtime:
  log:
    failure_level: error
  fetch: true

output:
  dir: ./build/site
