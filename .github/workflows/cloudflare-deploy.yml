name: Generate Site

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate docs/modules/ROOT from src/main/asciidoc
        run: bash scripts/migrate.sh

      - name: Build site with Antora and index it with Pagefind
        # `npm run build` runs Antora then `pagefind --site build/site`,
        # which rebuilds the full-text search index on every commit.
        run: npm run build

      - name: Deploy to Cloudflare Pages (production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/site --project-name=arcadedb-docs --branch=main
