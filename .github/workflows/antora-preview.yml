name: Antora Preview

on:
  push:
    branches:
      - 'feat/antora'
      - 'feat/antora-**'
  pull_request:
    branches:
      - 'feat/antora'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  build-and-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate docs/modules/ROOT from src/main/asciidoc
        run: bash scripts/migrate.sh

      - name: Build site with Antora and index it with Pagefind
        # `npm run build` runs Antora then `pagefind --site build/site`,
        # which rebuilds the full-text search index on every commit.
        run: npm run build

      - name: Deploy to Cloudflare Pages preview
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/site --project-name=arcadedb-docs --branch=antora-preview
